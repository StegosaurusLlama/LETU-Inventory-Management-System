<header class="sticky-top">
    <nav class="navbar navbar-expand-sm custom-navbar">
        <div class="container-fluid flex-column">

            <div class="navbar-nav w-100">
                <a class="nav-link nav-btn active" href="{{url_for('inventory')}}">Inventory</a>
                <a class="nav-link nav-btn" href="{{url_for('login')}}">Audit Log</a>
                <a class="nav-link nav-btn" href="{{url_for('user_account')}}">User Account</a>
                <form id="log-out-form" action="/log-out" method="POST"></form>
                <button class="nav-link nav-btn ms-auto" type="submit" form="log-out-form">Log out</a>
            </div>
            {% if request.endpoint == 'inventory' %}
                <div class="row w-100">
                    <div class="search-bar col-sm-2">
                        <button class="nav-btn" onclick="openAddItem()">Add Item</button>
                    </div>
                    <div class="search-bar col-sm-10">
                        <input type="text" placeholder="Search...">
                    </div>
                        <div id="add-item" class="add-item">
                        <div class="add-item-content">
                            <p>Add Item</p>
                            <form action="/submit-item" method="POST" enctype="multipart/form-data">
                                <input type="text" placeholder="Product Name" name="name">
                                <br>
                                <input type="number" step="0.01" min="0" placeholder="Enter Price" name="price">
                                <br>
                                <input type="number" min="0" placeholder="Enter Initial Stock" name="amount">
                                <br>
                                <textarea placeholder="Enter Description" name="desc"></textarea>
                                <br>
                                <input type="number" min="0" placeholder="Enter Low Threshhold" name="lowCount">
                                <br>
                                <input type="file" accept="image/*" name="imageFile">
                                <br>
                                <input type="submit" value="Submit">
                            </form>
                        </div>
                    </div>
                </div>
            {% endif %}
        </div>
    </nav>
</header>
