<header class="sticky-top">
    <nav class="navbar navbar-expand-sm custom-navbar mb-0 p-0">
        <div class="container-fluid h-100 m-0 p-0">

            <div class="navbar-nav w-100 h-100">
                <a class="nav-link nav-btn d-inline-flex align-items-center align-self-stretch {% if request.endpoint == 'inventory' %}active{% endif %}"
                    href="{{url_for('inventory')}}">Inventory</a>
                {% if session.clearance == 3 %}
                <a class="nav-link nav-btn d-inline-flex align-items-center flex-grow-0 {% if request.endpoint == 'audit_log' %}active{% endif %}"
                    href="{{url_for('audit_log')}}">Audit Log</a>
                {% endif %}
                <a class="nav-link nav-btn d-inline-flex align-items-center {% if request.endpoint == 'user_account' %}active{% endif %}"
                    href="{{url_for('user_account')}}">User Account</a>
                {% if request.endpoint == 'inventory' %}
                {% if session.clearance == 3 %}
                <div class="m-auto p-1">
                    <button class="btn btn-primary text-nowrap px-1" data-bs-toggle="modal"
                        data-bs-target="#add-item-modal">Add
                        Item</button>
                </div>
                {% endif %}
                <div class="dropdown m-auto" onclick="event.stopPropagation()">
                    <button type="button" class="btn text-nowrap btn-primary dropdown-toggle"
                        data-bs-toggle="dropdown">Filter</button>
                    <div class=" dropdown-menu">
                        <p class="text-center">Select tags:</p>
                        <div class="d-flex flex-column m-2">
                            {% for tag in tags %}
                            <label class=" border rounded m-1">
                                <input type="checkbox" form="search-form" class="form-check-input m-1" name="tags"
                                    value="{{tag.tagID}}">
                                <span class="flex-fill">{{tag.name}}</span>
                            </label>
                            {% endfor %}
                        </div>
                    </div>
                </div>


                <div class="search-bar flex-grow-1">
                    <form action="submit-search" method="POST" id="search-form"> <!--Search bar-->
                        <div class="input-group">
                            <input type="text" placeholder="Search..." name="search" value="{{search}}">
                        </div>
                    </form>
                </div>
                {% endif %}
                <form id="log-out-form" action="/log-out" method="POST"></form>
                <button class="nav-link nav-btn ms-auto flex-shrink-0" type="submit" form="log-out-form">Log
                    out</button>
            </div>
        </div>

    </nav>
</header>
{% if request.endpoint == 'inventory' %}
<div class="modal fade" id="add-item-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <!-- Modal Header -->
            <div class="modal-header">
                <h4 class="modal-title w-100 text-center">Add Item</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <!-- Modal body -->
            <div class="modal-body">
                <form action="/submit-item" method="POST" enctype="multipart/form-data">
                    <input type="text" class="form-control" placeholder="Product Name" name="name">
                    <br>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" step="0.01" min="0" placeholder="Enter Price"
                            name="price">
                    </div>
                    <br>
                    <input type="number" class="form-control" min="0" placeholder="Enter Initial Stock" name="amount">
                    <br>
                    <textarea class="form-control" placeholder="Enter Description" name="desc"></textarea>
                    <br>
                    <input type="number" class="form-control" min="0" placeholder="Enter Low Threshhold"
                        name="lowCount">
                    <br>
                    <input type="file" class="form-control" accept="image/*" name="imageFile">
                    <br>
                    <input type="submit" class="form-control" value="Submit">
                </form>
            </div>
        </div>
    </div>
</div>
{% endif %}
