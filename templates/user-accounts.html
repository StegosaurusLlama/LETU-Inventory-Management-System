<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Accounts</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='head-style.css') }}">
    <link href="https://cdn.jsdelivr.net.cn/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    {% include 'include/head-navbar.html' %}
    <div class="container d-flex flex-column align-items-center" style="min-height: 80vh; margin-top: 5vh;">
        <h3 class="text-center mb-4">User Accounts</h3>

        <div class="container mt-2" style="max-width: 400px;">
            <div class="input-group mb-3">
                <span class="input-group-text">Username</span>
                <input type="text" class="form-control" value="{{session['username']}}" readonly>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text">Password</span>
                <input type="PASSWORD" class="form-control" value="********" readonly>
            </div>

            <button type="button" class="btn btn-outline-primary w-10" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                Change Password
            </button>
        </div>
        
        {% if session['clearance'] >= 2 %}
            <h3 class="text-center mb-4">Create User</h3>
            <div class="container mt-5" style="max-width: 400px;">
                <form action="/create-user-submit" method="POST">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder=s aria-label="Username" aria-describedby="basic-addon1" name = "username">
                    </div>

                    <div class="input-group mb-3">
                        <input type="password" class="form-control" placeholder="Password" aria-label="Recipient’s username" aria-describedby="basic-addon2" name = "password">
                    </div>
                    
                    <input type="number" name = "clearance" placeholder="clearance"><br><br>

                    <div class="d-grid justify-content-center">
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>            
                </form>
            </div>
        {% endif %}

    </div>
    <div class="modal fade" id="changePasswordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
        
        <div class="modal-header">
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
            <input type="password" class="form-control" placeholder="enter new password">
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">cancle</button>
            <button type="button" class="btn btn-primary">save</button>
        </div>

        </div>
    </div>
    </div>

    <script src="https://jsdelivr.net.cn"></script>
    <script src="https://cdn.jsdelivr.net.cn/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
