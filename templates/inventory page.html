<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory list</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='head style.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='inventory list.css') }}">
</head>
<body>
    <header class="tab-container">
        <a href="" class="nav-btn">inventory</a>
        <a href="" class="nav-btn">Audit Log</a>
        <a href="" class="nav-btn">User Account</a>
    </header>
    <div class="search-bar">
        <input type="text" placeholder="Search...">
    </div>
    {% for item in items %}
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-info">
                <h2 id="name-1">{{item.name}}</h2>
                <p>Item #: {{item.num}}</p>
                <p>Price: {{item.price}}</p>
                <p id="desc-1">Description: {{item.desc}}</p>
                <div class="tag-list">
                    <div class="tag"><span>X</span> tag</div>
                </div>
            </div>
            <div class="edit-btn" onclick="editItem(1)">✎</div>
            <div class="note">Note: Only roles that can edit items and such see this button</div>
        </div>
    {% endfor %}
</div>
<script>
    function editItem(id) {
        const newName = prompt("Enter new item name:", document.getElementById('name-' + id).innerText);
        if (newName) {
            document.getElementById('name-' + id).innerText = newName;
        }
        const newDesc = prompt("Enter new description:", document.getElementById('desc-' + id).innerText);
        if (newDesc) {
            document.getElementById('desc-' + id).innerText = newDesc;
        }
    }
</script>

</body>
</html>
